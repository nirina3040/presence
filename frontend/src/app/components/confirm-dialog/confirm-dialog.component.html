<div class="dialog-overlay" *ngIf="isVisible" (click)="cancel()" (keyup.escape)="onEscape()">
  <div class="dialog-container" [class]="getDialogClass()" (click)="$event.stopPropagation()">
    <div class="dialog-header" [style.borderBottomColor]="getIconColor()">
      <div class="dialog-icon" [style.backgroundColor]="getIconColor()">
        {{ getIcon() }}
      </div>
      <h2>{{ options.title }}</h2>
      <button class="dialog-close" (click)="cancel()">×</button>
    </div>
    
    <div class="dialog-body">
      <p>{{ options.message }}</p>
    </div>
    
    <div class="dialog-footer">
      <button class="btn-cancel" *ngIf="options.cancelText" (click)="cancel()">
        {{ options.cancelText }}
      </button>
      <button class="btn-confirm" [class]="options.type" (click)="confirm()">
        {{ options.confirmText }}
      </button>
    </div>
  </div>
</div>
